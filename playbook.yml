---
# ============================================================
# WordPress Deployment Playbook
# Target OS : Ubuntu 22.04 on EC2
# Stack     : Apache + PHP + MySQL + WordPress
# Usage     : ansible-playbook -i inventory.ini playbook.yml
# ============================================================

- name: Deploy WordPress on Ubuntu 22
  hosts: wordpress
  become: true               # run tasks as sudo
  vars_files:
    - vars.yml

  tasks:

    # ----------------------------------------------------------
    # 1. SYSTEM — update packages
    # ----------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    # ----------------------------------------------------------
    # 2. APACHE — web server
    # ----------------------------------------------------------
    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Enable Apache and start service
      service:
        name: apache2
        state: started
        enabled: true

    # ----------------------------------------------------------
    # 3. PHP — runtime and required extensions
    # ----------------------------------------------------------
    - name: Install PHP and required extensions
      apt:
        name:
          - php{{ php_version }}
          - php{{ php_version }}-mysql
          - php{{ php_version }}-curl
          - php{{ php_version }}-gd
          - php{{ php_version }}-mbstring
          - php{{ php_version }}-xml
          - php{{ php_version }}-zip
          - libapache2-mod-php{{ php_version }}
        state: present

    # ----------------------------------------------------------
    # 4. MYSQL — database server
    # ----------------------------------------------------------
    - name: Install MySQL server and Python MySQL client
      apt:
        name:
          - mysql-server
          - python3-pymysql   # needed by Ansible's mysql_* modules
        state: present

    - name: Start and enable MySQL
      service:
        name: mysql
        state: started
        enabled: true

    - name: Set MySQL root password
      mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock
        state: present

    - name: Create WordPress database
      mysql_db:
        name: "{{ mysql_db_name }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Create WordPress database user
      mysql_user:
        name: "{{ mysql_db_user }}"
        password: "{{ mysql_db_password }}"
        priv: "{{ mysql_db_name }}.*:ALL"
        host: localhost
        login_user: root
        login_password: "{{ mysql_root_password }}"
        state: present

    # ----------------------------------------------------------
    # 5. WORDPRESS — download and extract
    # ----------------------------------------------------------
    - name: Install required tools (wget, unzip)
      apt:
        name:
          - wget
          - unzip
        state: present

    - name: Download WordPress
      get_url:
        url: "https://wordpress.org/wordpress-{{ wordpress_version }}.tar.gz"
        dest: /tmp/wordpress.tar.gz

    - name: Extract WordPress to install directory
      unarchive:
        src: /tmp/wordpress.tar.gz
        dest: /tmp/
        remote_src: true

    - name: Copy WordPress files to web root
      copy:
        src: /tmp/wordpress/
        dest: "{{ wordpress_install_dir }}/"
        remote_src: true
        owner: www-data
        group: www-data

    - name: Remove default Apache index.html
      file:
        path: "{{ wordpress_install_dir }}/index.html"
        state: absent

    # ----------------------------------------------------------
    # 6. WORDPRESS CONFIG — generate wp-config.php
    # ----------------------------------------------------------
    - name: Fetch WordPress secret salts from the API
      uri:
        url: https://api.wordpress.org/secret-key/1.1/salt/
        return_content: true
      register: wp_salts_response

    - name: Set salts as a variable
      set_fact:
        wordpress_salts: "{{ wp_salts_response.content }}"

    - name: Deploy wp-config.php from template
      template:
        src: templates/wp-config.php.j2
        dest: "{{ wordpress_install_dir }}/wp-config.php"
        owner: www-data
        group: www-data
        mode: "0640"

    # ----------------------------------------------------------
    # 7. PERMISSIONS — set correct ownership
    # ----------------------------------------------------------
    - name: Set ownership of WordPress files
      file:
        path: "{{ wordpress_install_dir }}"
        owner: www-data
        group: www-data
        recurse: true

    # ----------------------------------------------------------
    # 8. APACHE — enable mod_rewrite for WordPress permalinks
    # ----------------------------------------------------------
    - name: Enable Apache mod_rewrite
      apache2_module:
        name: rewrite
        state: present
      notify: Restart Apache

    - name: Allow .htaccess overrides in web root
      copy:
        dest: /etc/apache2/sites-available/wordpress.conf
        content: |
          <VirtualHost *:80>
              DocumentRoot {{ wordpress_install_dir }}
              <Directory {{ wordpress_install_dir }}>
                  AllowOverride All
                  Require all granted
              </Directory>
          </VirtualHost>
        owner: root
        group: root
        mode: "0644"
      notify: Restart Apache

    - name: Enable WordPress site config
      command: a2ensite wordpress.conf
      notify: Restart Apache

    - name: Disable default Apache site
      command: a2dissite 000-default.conf
      notify: Restart Apache

  # ----------------------------------------------------------
  # HANDLERS — triggered by notify
  # ----------------------------------------------------------
  handlers:
    - name: Restart Apache
      service:
        name: apache2
        state: restarted
